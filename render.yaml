services:
  - type: web
    name: agromarket-backend
    runtime: python
    rootDir: BackEnd
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-start.sh
    healthCheckPath: /docs
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_V1_STR
        value: /api/v1
      - key: SMS_ENABLED
        value: "true"
      - key: DB_PORT
        value: "5432"
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
